name: Docker Build & Push to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/docker.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t eks-app:latest app/

      - name: Test Docker image
        run: docker run --rm eks-app:latest --version || true

      # ECR Push는 AWS 자격증명 필요 (나중에 설정)
